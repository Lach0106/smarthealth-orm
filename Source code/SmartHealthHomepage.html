<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHealth Appointment Booking System</title>
    <style>
        body {
            background-color: aliceblue;
            color: dimgray;
            font-family: Calibri;
            margin: 0;
        }

        button {
            background-color: royalblue;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-family: Calibri;
            margin-top: 20px;
            padding: 12px 20px;
        }

        form {
            background-color: white;
            border: 1px solid lightgray;
            border-radius: 10px;
            font-family: Calibri;
            margin: 30px auto;
            max-width: 600px;
            padding: 20px;
            width: 80%;
        }

        h1 {
            text-align: center;
        }

        h2 {
            text-align: center;
        }

        h3 {
            border-bottom: 2px solid lightblue;
            color: royalblue;
            font-family: Calibri;
            padding-bottom: 5px;
            text-align: center;
        }

        header {
            background-color: royalblue;
            color: white;
            font-family: Calibri;
            padding: 20px;
            text-align: center;
        }

        input {
            background-color: whitesmoke;
            border: 1px solid lightgray;
            border-radius: 5px;
            font-family: Calibri;
            padding: 10px;
            width: 30%;
        }

        label {
            color: royalblue;
            display: block;
            font-family: Calibri;
            font-weight: bold;
            margin-bottom: 5px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>SmartHealth Medical Center</h1>
        <h2>HealthCare Appointment System</h2>
    </div>
    <div class="container">
        <div class="infoBox">
            <h3>Patient Search Portal</h3>
            <label>Patient ID</label>
            <input type="number" id="patientID" placeholder="Enter Patient ID">
            <br />
            <button onclick="checkPatient()">Check Latest Appointment</button>
        </div>
        <div class="displayContainer">
            <h3>Latest Appointment Details</h3>
            <p>
                <strong>Appointment ID:</strong>
                <label id="appointmentID" hidden></label>
            </p>
            <p>
                <strong>Patient Full Name:</strong>
                <label id="patientFullName" hidden></label>
            </p>

            <p>
                <strong>Booking Date:</strong>
                <label id="bookingDate" hidden></label>
            </p>

            <p>
                <strong>Appointment Date and Time:</strong>
                <label id="dateTimeForAppointment" hidden></label>
            </p>

            <p>
                <strong>Status:</strong>
                <label id="status" hidden></label>
            </p>

            <p>
                <strong>Booking Method:</strong>
                <label id="bookingMethod" hidden></label>
            </p>
        </div>
        <div class="formSection">
            <h3>Create New Appointment</h3>
            <form id="appointmentForm">
                <label>Patient ID</label>
                <input type="number" id="formPatientID">
                <label>Appointment Date & Time</label>
                <input type="datetime-local" id="appointmentDateTime">
                <label>Booking Method</label>
                <select id="formBookingMethod">
                    <option value="phone">Phone</option>
                    <option value="online">Online</option>
                    <option value="in person">In Person</option>
                </select>
                <label>Doctor ID</label>
                <input type="number" id="doctorID">
                <label>Clinic ID</label>
                <input type="number" id="clinicID">
                <label>Room Number</label>
                <input type="text" id="roomNo">
                <br />
                <button type="submit" class="btn">Book Appointment</button>
            </form>
        </div>
    </div>

    <script>
        async function checkPatient() {
            const patientId =
                document.getElementById("patientID").value;
            if (!patientId) {
                alert("Please enter a Patient ID");
                return;
            }
            const response =
                await fetch(
                    "validatePatient?patientId=" + patientId
                );
            const result = await response.json();
            if (!result.exists) {
                alert("Patient ID does not exist");
                return;
            }
            alert("Patient found");
        }

        document.getElementById("appointmentForm").addEventListener("submit", function (event) {
            event.preventDefault();
            var patientID = document.getElementById("formPatientID").value;
            var appointmentDateTime = document.getElementById("appointmentDateTime").value;
            var doctorID = document.getElementById("doctorID").value;
            var clinicID = document.getElementById("clinicID").value;
            var roomNo = document.getElementById("roomNo").value;
            if (patientID === "" || appointmentDateTime === "" || doctorID === "" || clinicID === "" || roomNo === "") {
                alert("Please complete all fields before continuing");
                return;
            }
            if (patientID <= 0) {
                alert("Patient ID must be a positive number.");
                return;
            }
            if (doctorID <= 0) {
                alert("Doctor ID must be a positive number.");
                return;
            }
            if (clinicID <= 0) {
                alert("Clinic ID must be a positive number.");
                return;
            }
            if (roomNo !== "") {
                const roomRegEx = /^[a-zA-Z0-9]+$/;
                if (!roomRegEx.test(roomNo)) {
                    alert("Invalid format for Room Number");
                    return;
                }
            }
            var now = new Date();
            var selectedDate = new Date(appointmentDateTime);
            if (selectedDate.getTime() <= now.getTime()) {
                alert("Please select a future date and time to schedule your appointment");
                return;
            }
            alert("Your appointment has been booked successfully!");
        });
    </script>
</body>

</html>
